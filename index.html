<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="darkreader-lock">
    <meta name="color-scheme" content="light">
    <title>Aesthetic Calendar - PNG Icons Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&family=Mali:wght@500;600&display=swap" rel="stylesheet">
    <style>
        :root, html, body { forced-color-adjust: none !important; color-adjust: exact !important; }
        :root { --page-bg: transparent; --text-color: #4A3A35; --badge-text: #FFFFFF; --btn-bg: #FFF; }

        /* --- TEMI --- */
        [data-theme="light"] { --page-bg: #FFFFFF; --text-color: #4A3A35; --btn-bg: #FFFFFF; }
        [data-theme="beige"] { --page-bg: #FFFBE6; --text-color: #5A504B; --btn-bg: #FFFBE6; }
        [data-theme="dark"] { --page-bg: #191919; --text-color: #F0F0F0; --btn-bg: #2C2C2C; }
        [data-theme="transparent"] { --page-bg: transparent; }

        /* --- PALETTE --- */
        [data-color="strawberry"] { --accent-main: #C66F80; --badge-bg: #4A6644; --cell-bg: #FCEBF1; --header-bg: #FADCE5; }
        [data-color="matcha"] { --accent-main: #6B705C; --badge-bg: #9C6644; --cell-bg: #F4F1DE; --header-bg: #EAE2B7; }
        [data-color="blueberry"] { --accent-main: #3F3C79; --badge-bg: #5A6ACF; --cell-bg: #FFF6EC; --header-bg: #EAEBF5; }
        [data-color="grape"] { --accent-main: #593C6B; --badge-bg: #D4A373; --cell-bg: #F8F3FA; --header-bg: #EBE0F0; }
        [data-color="choco"] { --accent-main: #5C4033; --badge-bg: #D9A05B; --cell-bg: #FCF8F2; --header-bg: #F2E3D5; }

        body, html { margin: 0; padding: clamp(5px, 2vw, 15px); background-color: var(--page-bg); font-family: 'Nunito', sans-serif; color: var(--text-color); display: flex; flex-direction: column; align-items: center; transition: background-color 0.3s ease; }

        .controls-container { display: flex; gap: 15px; margin-bottom: 20px; padding: 8px 20px; background-color: var(--btn-bg); border-radius: 20px; align-items: center; flex-wrap: wrap; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 2px solid var(--accent-main); }
        .color-dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid var(--accent-main); transition: transform 0.2s; }
        .action-btn { background-color: var(--badge-bg); color: var(--badge-text); border: 2px solid var(--accent-main); border-radius: 12px; padding: 4px 12px; font-family: 'Nunito', sans-serif; font-weight: 700; cursor: pointer; outline: none; }
        
        .calendar-wrapper { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 10px; }
        .month-header { display: flex; justify-content: space-between; align-items: center; background-color: var(--header-bg); padding: 10px 20px; border-radius: 16px; border: 3px solid var(--accent-main); }
        .calendar-frame { background-color: var(--accent-main); padding: 6px; border-radius: 16px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .day-name { background-color: var(--header-bg); color: var(--accent-main); text-align: center; font-weight: 800; font-size: 14px; padding: 8px 0; border-radius: 8px; text-transform: uppercase; }
        
        .calendar-grid { display: grid; gap: 4px; }
        .calendar-grid.month-view, .calendar-grid.week-view { grid-template-columns: repeat(7, 1fr); }
        .calendar-grid.day-view { display: block; width: 100%; }

        /* --- CELLE E ICONE PNG --- */
        .cell { background-color: var(--cell-bg); border-radius: 8px; display: flex; flex-direction: column; position: relative; cursor: pointer; overflow: hidden; min-width: 0; min-height: 0; }
        .month-view .cell { aspect-ratio: 1 / 1; }

        .date-badge {
            position: relative;
            width: 40px; height: 40px; /* Dimensione aumentata per l'icona */
            display: flex; align-items: center; justify-content: center;
            margin: 4px; z-index: 15;
        }

        .date-icon {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: contain; /* L'icona si adatta senza deformarsi */
            pointer-events: none;
        }

        .date-number {
            position: relative;
            font-weight: 800; font-size: 14px;
            color: var(--badge-text); /* Numero sopra l'icona */
            z-index: 16;
        }

        /* Effetti drag */
        body.is-dragging .event-block { opacity: 0.3; }
        .drag-over { background-color: var(--header-bg) !important; border: 2px dashed var(--accent-main) !important; }

        /* ... Altri stili (modal, tooltip, etc) rimangono invariati per brevità ... */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.5); z-index: 9999; justify-content: center; align-items: center; }
        .modal-window { background: var(--cell-bg); border: 4px solid var(--accent-main); border-radius: 16px; padding: 20px; width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; }
        .list-event-item { display: flex; justify-content: space-between; align-items: center; background: var(--btn-bg); border: 2px solid var(--accent-main); padding: 10px; border-radius: 8px; margin-bottom: 8px; }
    </style>
</head>
<body data-theme="transparent" data-color="blueberry">

    <div class="controls-container">
        <div class="picker-group">
            <div class="color-dot" style="background: #FFFFFF;" data-theme-target="light"></div>
            <div class="color-dot" style="background: #FFFBE6;" data-theme-target="beige"></div>
            <div class="color-dot" style="background: #191919;" data-theme-target="dark"></div>
        </div>
        <div class="picker-separator"></div>
        <div class="picker-group">
            <div class="color-dot" style="background: linear-gradient(135deg, #C66F80 33%, #4A6644 66%, #FCEBF1 100%);" data-color-target="strawberry"></div>
            <div class="color-dot" style="background: linear-gradient(135deg, #6B705C 33%, #9C6644 66%, #F4F1DE 100%);" data-color-target="matcha"></div>
            <div class="color-dot" style="background: linear-gradient(135deg, #3F3C79 33%, #5A6ACF 66%, #FFF6EC 100%);" data-color-target="blueberry"></div>
            <div class="color-dot" style="background: linear-gradient(135deg, #593C6B 33%, #D4A373 66%, #F8F3FA 100%);" data-color-target="grape"></div>
            <div class="color-dot" style="background: linear-gradient(135deg, #5C4033 33%, #D9A05B 66%, #FCF8F2 100%);" data-color-target="choco"></div>
        </div>
        <div class="picker-separator"></div>
        <select class="action-btn outline" id="view-select" onchange="changeView(this.value)">
            <option value="month">Mese</option>
            <option value="week">Settimana</option>
            <option value="day">Giorno</option>
        </select>
    </div>

    <div class="calendar-wrapper">
        <div class="month-header" id="dynamic-header">
            <button class="nav-btn" onclick="navigate(-1)">◀</button>
            <h2 id="calendar-title"></h2>
            <button class="nav-btn" onclick="navigate(1)">▶</button>
        </div>
        <div class="calendar-frame">
            <div class="days-row" id="main-days-row">
                <div class="day-name">Lun</div><div class="day-name">Mar</div><div class="day-name">Mer</div><div class="day-name">Gio</div><div class="day-name">Ven</div><div class="day-name">Sab</div><div class="day-name">Dom</div>
            </div>
            <div class="calendar-grid month-view" id="calendar-grid"></div>
        </div>
    </div>

    <div id="event-modal" class="modal-overlay">
        <div class="modal-window">
            <h3 id="modal-date-title"></h3>
            <div id="modal-list-view">
                <div id="modal-events-list"></div>
                <button class="action-btn" onclick="showEventForm(null)" style="width:100%">+ Nuovo</button>
            </div>
            <div id="modal-form-view" style="display:none">
                <input type="text" id="modal-title" placeholder="Evento...">
                <input type="text" id="modal-time" placeholder="Ora (es 15:30)">
                <textarea id="modal-notes" placeholder="Note..."></textarea>
                <button class="action-btn" onclick="saveEvent()">Salva</button>
                <button class="action-btn outline" onclick="backToListOrClose()">Annulla</button>
            </div>
        </div>
    </div>

    <script>
        const safeStorage = {
            get: (k) => JSON.parse(localStorage.getItem(k)),
            set: (k, v) => localStorage.setItem(k, JSON.stringify(v))
        };

        let currentTheme = safeStorage.get('cal-theme') || 'transparent';
        let currentColor = safeStorage.get('cal-color') || 'strawberry';
        let calendarEvents = safeStorage.get('cal-events-multi') || {};
        let baseDate = new Date();
        let currentView = 'month';

        function setTheme(t) { document.body.setAttribute('data-theme', t); safeStorage.set('cal-theme', t); }
        
        // FUNZIONE PER CAMBIARE COLORE E ICONA
        function setColor(c) { 
            currentColor = c;
            document.body.setAttribute('data-color', c); 
            safeStorage.set('cal-color', c);
            renderCalendar(); // Ricarica per cambiare le immagini
        }

        document.querySelectorAll('[data-theme-target]').forEach(d => d.onclick = () => setTheme(d.dataset.themeTarget));
        document.querySelectorAll('[data-color-target]').forEach(d => d.onclick = () => setColor(d.dataset.colorTarget));

        function createCell(y, m, d, empty) {
            const cell = document.createElement('div');
            cell.className = `cell ${empty ? 'empty' : ''}`;
            if (!empty) {
                const dateKey = `${y}-${m+1}-${d}`;
                cell.onclick = () => openModal(y, m, d);

                // CREAZIONE DEL BADGE CON IMMAGINE PNG
                const badge = document.createElement('div');
                badge.className = 'date-badge';
                
                const icon = document.createElement('img');
                icon.className = 'date-icon';
                // Carica l'immagine corretta in base al tema scelto!
                icon.src = `${currentColor}_icon.png`; 
                
                const num = document.createElement('span');
                num.className = 'date-number';
                num.innerText = d;

                badge.appendChild(icon);
                badge.appendChild(num);
                cell.appendChild(badge);

                if (calendarEvents[dateKey]) {
                    const heart = document.createElement('div');
                    heart.className = 'aesthetic-indicator';
                    heart.innerText = '♥';
                    cell.appendChild(heart);
                }
            }
            return cell;
        }

        // ... Resto delle funzioni logic (navigate, openModal, saveEvent, renderCalendar) ...
        // (Ho mantenuto la logica degli eventi multipli e della navigazione)

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            const y = baseDate.getFullYear();
            const m = baseDate.getMonth();
            document.getElementById('calendar-title').innerText = `${m+1} / ${y}`;

            const first = new Date(y, m, 1).getDay();
            const days = new Date(y, m + 1, 0).getDate();
            const pad = first === 0 ? 6 : first - 1;

            for (let i = 0; i < pad; i++) grid.appendChild(createCell(y, m, 0, true));
            for (let d = 1; d <= days; d++) grid.appendChild(createCell(y, m, d, false));
        }

        function openModal(y, m, d) {
            currentEditingDate = `${y}-${m+1}-${d}`;
            document.getElementById('modal-date-title').innerText = `${d}/${m+1}/${y}`;
            showEventList();
            document.getElementById('event-modal').style.display = 'flex';
        }

        function showEventList() {
            const list = document.getElementById('modal-events-list');
            list.innerHTML = '';
            const evs = calendarEvents[currentEditingDate] || [];
            evs.forEach((e, idx) => {
                const item = document.createElement('div');
                item.className = 'list-event-item';
                item.innerHTML = `<span>${e.title}</span>`;
                list.appendChild(item);
            });
            document.getElementById('modal-list-view').style.display = 'block';
            document.getElementById('modal-form-view').style.display = 'none';
        }

        function showEventForm() {
            document.getElementById('modal-list-view').style.display = 'none';
            document.getElementById('modal-form-view').style.display = 'block';
        }

        function saveEvent() {
            const title = document.getElementById('modal-title').value;
            if (!calendarEvents[currentEditingDate]) calendarEvents[currentEditingDate] = [];
            calendarEvents[currentEditingDate].push({ title });
            safeStorage.set('cal-events-multi', calendarEvents);
            document.getElementById('event-modal').style.display = 'none';
            renderCalendar();
        }

        function navigate(dir) {
            baseDate.setMonth(baseDate.getMonth() + dir);
            renderCalendar();
        }

        setTheme(currentTheme);
        setColor(currentColor);
    </script>
</body>
</html>
