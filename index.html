<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="darkreader-lock">
    <meta name="color-scheme" content="light">
    <title>Aesthetic Calendar</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&family=Mali:wght@500;600&display=swap" rel="stylesheet">
    <style>
        :root, html, body { forced-color-adjust: none !important; color-adjust: exact !important; box-sizing: border-box; }
        *, *:before, *:after { box-sizing: inherit; }

        :root { --page-bg: transparent; --text-color: #4A3A35; --badge-text: #FFFFFF; --btn-bg: #FFF; }

        [data-theme="light"] { --page-bg: #FFFFFF; --text-color: #4A3A35; --btn-bg: #FFFFFF; }
        [data-theme="beige"] { --page-bg: #FFFBE6; --text-color: #5A504B; --btn-bg: #FFFBE6; }
        [data-theme="dark"] { --page-bg: #191919; --text-color: #F0F0F0; --btn-bg: #2C2C2C; }
        [data-theme="transparent"] { --page-bg: transparent; }

        [data-color="strawberry"] { --accent-main: #C66F80; --badge-bg: #4A6644; --cell-bg: #FCEBF1; --header-bg: #FADCE5; }
        [data-color="matcha"] { --accent-main: #6B705C; --badge-bg: #9C6644; --cell-bg: #F4F1DE; --header-bg: #EAE2B7; }
        [data-color="blueberry"] { --accent-main: #3F3C79; --badge-bg: #5A6ACF; --cell-bg: #FFF6EC; --header-bg: #EAEBF5; }
        [data-color="grape"] { --accent-main: #593C6B; --badge-bg: #D4A373; --cell-bg: #F8F3FA; --header-bg: #EBE0F0; }
        [data-color="choco"] { --accent-main: #5C4033; --badge-bg: #D9A05B; --cell-bg: #FCF8F2; --header-bg: #F2E3D5; }

        [data-theme="dark"][data-color="strawberry"] { --accent-main: #D68594; --badge-bg: #6A8A63; --cell-bg: #2B1C20; --header-bg: #3D282D; }
        [data-theme="dark"][data-color="matcha"] { --accent-main: #8A9276; --badge-bg: #B88565; --cell-bg: #1E2219; --header-bg: #2B3024; }
        [data-theme="dark"][data-color="blueberry"] { --accent-main: #5A6ACF; --badge-bg: #3F3C79; --cell-bg: #1B1B3A; --header-bg: #26264A; }
        [data-theme="dark"][data-color="grape"] { --accent-main: #805B96; --badge-bg: #E3BB91; --cell-bg: #221B26; --header-bg: #302636; }
        [data-theme="dark"][data-color="choco"] { --accent-main: #7A5849; --badge-bg: #E6B57A; --cell-bg: #241D1A; --header-bg: #332A26; }

        body {
            margin: 0; padding: clamp(5px, 2vw, 15px); background-color: var(--page-bg); 
            font-family: 'Nunito', sans-serif; color: var(--text-color); 
            display: flex; flex-direction: column; align-items: center; transition: background-color 0.3s ease; min-height: 100vh;
        }

        .controls-container {
            display: flex; gap: 15px; margin-bottom: 20px; padding: 8px 20px; background-color: var(--btn-bg); 
            border-radius: 20px; align-items: center; flex-wrap: wrap; justify-content: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 2px solid var(--accent-main); width: 100%; max-width: 750px; 
        }
        .picker-group { display: flex; gap: 8px; align-items: center; }
        .picker-separator { width: 2px; height: 20px; background-color: var(--accent-main); opacity: 0.3; }
        .color-dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid var(--accent-main); transition: transform 0.2s; flex-shrink:0;}
        .color-dot:hover { transform: scale(1.2); }
        .action-btn { background-color: var(--badge-bg); color: var(--badge-text); border: 2px solid var(--accent-main); border-radius: 12px; padding: 4px 12px; font-family: 'Nunito', sans-serif; font-weight: 700; cursor: pointer; outline: none; transition: transform 0.1s;}
        .action-btn:active { transform: scale(0.95); }
        .action-btn.outline { background-color: var(--btn-bg); color: var(--text-color); }
        select.action-btn { cursor: pointer; padding: 4px 8px; }

        .calendar-wrapper { width: 100%; max-width: 750px; display: flex; flex-direction: column; gap: 10px; flex: 1;}
        .month-header { display: flex; justify-content: space-between; align-items: center; background-color: var(--header-bg); padding: 10px 20px; border-radius: 16px; border: 3px solid var(--accent-main); }
        .month-header h2 { margin: 0; font-size: 24px; color: var(--accent-main); text-transform: uppercase; font-weight: 800; flex: 1; text-align: center;}
        .nav-btn { background: var(--btn-bg); border: 2px solid var(--accent-main); color: var(--accent-main); border-radius: 8px; cursor: pointer; padding: 4px 12px; font-weight: bold; font-family: 'Nunito'; }

        .calendar-frame { background-color: var(--accent-main); padding: 6px; border-radius: 16px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); width: 100%; }
        .days-row { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 4px; margin-bottom: 4px; }
        .day-name { background-color: var(--header-bg); color: var(--accent-main); text-align: center; font-weight: 800; font-size: 14px; padding: 8px 0; border-radius: 8px; text-transform: uppercase; }
        
        .calendar-grid { width: 100%; gap: 4px; }
        .calendar-grid.month-view, .calendar-grid.week-view { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); }
        .calendar-grid.year-view { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
        .calendar-grid.day-view { display: block; width: 100%; }

        .cell {
            background-color: var(--cell-bg); border-radius: 8px; display: flex; flex-direction: column; 
            position: relative; cursor: pointer; overflow: hidden; min-width: 0; min-height: 0; transition: border 0.1s; border: 2px solid transparent;
        }
        .month-view .cell { aspect-ratio: 1 / 1; }
        .week-view .cell { aspect-ratio: auto; min-height: 400px; }

        .cell:hover:not(.empty) { filter: brightness(0.95); }
        .cell.empty { background-color: rgba(255,255,255,0.3); cursor: default; border: 2px solid transparent; }

        .date-badge {
            background-color: var(--badge-bg); color: var(--badge-text); border-radius: 50%; width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center; margin: 6px; align-self: flex-start; 
            font-weight: 800; font-size: 14px; border: 2px solid var(--accent-main); flex-shrink: 0; z-index: 15;
        }

        /* --- BARRA TRASPARENTE PER EVENTI MULTI-GIORNO --- */
        .multi-day-bar {
            position: absolute; left: 0; right: 0; 
            top: 35px; height: 8px; 
            background: var(--accent-main); opacity: 0.35; 
            z-index: 5; pointer-events: none;
        }
        .multi-day-bar.start { left: 10px; border-top-left-radius: 4px; border-bottom-left-radius: 4px; }
        .multi-day-bar.end { right: 10px; border-top-right-radius: 4px; border-bottom-right-radius: 4px; }
        .year-view .multi-day-bar { top: 12px; height: 4px; }

        .event-block {
            background-color: var(--badge-bg); color: var(--badge-text); margin: 0 6px; padding: 6px 20px 6px 8px;
            border-radius: 8px; font-family: 'Mali', cursive; font-size: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            border: 1px solid var(--accent-main); position: relative; cursor: grab; transition: transform 0.1s; word-break: break-word;
        }
        .event-block:active { cursor: grabbing; transform: scale(0.98); }
        .event-block .time { font-weight: 800; font-size: 11px; margin-bottom: 2px; opacity: 0.9; }
        .event-block .title { font-weight: 700; line-height: 1.2; }

        .edit-dots { position: absolute; top: 4px; right: 4px; font-size: 14px; font-weight: bold; line-height: 1; cursor: pointer; opacity: 0.6; padding: 0 4px; border-radius: 4px; }
        .edit-dots:hover { opacity: 1; background: rgba(0,0,0,0.2); }

        .aesthetic-indicator { 
            position: absolute; bottom: 8px; right: 10px !important; 
            color: var(--accent-main); font-size: 20px; text-shadow: 0 0 6px rgba(0,0,0,0.1); 
            animation: floatHeart 2s ease-in-out infinite; pointer-events: none; z-index: 10;
        }
        @keyframes floatHeart { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-4px) scale(1.15); } }

        .day-timeline-wrapper { background: var(--cell-bg); border: 2px solid var(--accent-main); height: 60vh; min-height: 400px; overflow-y: auto; position: relative; padding-bottom: 40px; border-radius: 12px; }
        .timeline-header { position: sticky; top: 0; background: var(--header-bg); z-index: 20; padding: 10px 15px; border-bottom: 2px solid var(--accent-main); display: flex; justify-content: space-between; align-items: center; }
        .large-badge { width: auto; height: auto; border-radius: 20px; padding: 4px 16px; font-size: 16px; margin: 0; display: flex; align-items: center; white-space: nowrap; }
        
        .timeline-hour-row { display: flex; height: 60px; border-bottom: 1px dashed rgba(0,0,0,0.08); position: relative; }
        .timeline-time { width: 60px; padding-right: 10px; text-align: right; font-size: 12px; color: var(--accent-main); font-weight: 800; opacity: 0.7; transform: translateY(-8px); pointer-events: none;}
        
        .timeline-event-block { position: absolute; left: 70px; border-radius: 8px; padding: 8px 24px 8px 12px; font-family: 'Mali', cursive; box-shadow: 0 3px 12px rgba(0,0,0,0.3); border: 2px solid var(--accent-main); cursor: grab; overflow: hidden; min-height: 25px; transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .timeline-event-block:hover { transform: scale(1.02); box-shadow: 0 8px 20px rgba(0,0,0,0.4); z-index: 50 !important; }

        .mini-month { background: var(--cell-bg); border: 2px solid var(--accent-main); border-radius: 12px; padding: 10px; display: flex; flex-direction: column; gap: 4px; }
        .mini-month-title { text-align: center; color: var(--accent-main); font-weight: 800; text-transform: uppercase; font-size: 14px; }
        .mini-days-row { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-weight: 800; font-size: 10px; color: var(--badge-bg); margin-bottom: 2px; }
        .mini-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 2px; position: relative; }
        .mini-cell { aspect-ratio: 1; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; cursor: pointer; color: var(--text-color); transition: background 0.2s; position: relative; z-index: 10;}
        .mini-cell:hover { background: rgba(0,0,0,0.1); }
        .mini-cell.has-event { background: var(--badge-bg); color: var(--badge-text); }
        .mini-cell.is-today { border: 2px solid var(--accent-main); }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.5); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(2px); }
        .modal-window { background: var(--cell-bg); border: 4px solid var(--accent-main); border-radius: 16px; padding: 20px; width: 90%; max-width: 450px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .modal-window h3 { margin: 0; color: var(--accent-main); font-size: 22px; text-transform: uppercase; font-weight: 800; text-align: center; }
        .modal-window input, .modal-window textarea { width: 100%; box-sizing: border-box; background: var(--btn-bg); border: 2px solid var(--accent-main); color: var(--text-color); border-radius: 8px; padding: 10px; font-family: 'Mali', cursive; font-size: 16px; outline: none; }
        .modal-window textarea { resize: vertical; min-height: 80px; }
        .list-event-item { display: flex; justify-content: space-between; align-items: center; background: var(--btn-bg); border: 2px solid var(--accent-main); padding: 10px; border-radius: 8px; margin-bottom: 8px; }

        .time-select-container { display: flex; gap: 10px; width: 100%; flex-wrap: wrap; }
        .time-select-group { display: flex; gap: 4px; flex: 1; min-width: 140px; align-items: center; background: var(--btn-bg); border: 2px solid var(--accent-main); border-radius: 8px; padding: 4px 8px; }
        .time-select-label { font-size: 12px; font-weight: bold; color: var(--accent-main); }
        .time-select-group select { flex: 1; border: none; background: transparent; outline: none; font-family: 'Mali', cursive; font-size: 14px; color: var(--text-color); cursor: pointer; }

        .site-footer { margin-top: 30px; padding: 20px; font-family: 'Mali', cursive; font-size: 14px; color: var(--text-color); opacity: 0.6; text-align: center; font-weight: 600; width: 100%; }
        #custom-tooltip { position: fixed; display: none; flex-direction: column; gap: 8px; background: rgba(255, 255, 255, 0.96); border: 3px solid var(--accent-main); color: var(--text-color); padding: 12px 16px; border-radius: 14px; font-family: 'Mali', cursive; font-size: 14px; box-shadow: 0 10px 30px rgba(0,0,0,0.25); pointer-events: none; z-index: 10000; width: max-content; max-width: 280px; opacity: 0; transform: translate(-50%, -90%) scale(0.95); transition: all 0.2s; backdrop-filter: blur(4px); }
        .tooltip-item { border-bottom: 1px dashed var(--accent-main); padding-bottom: 8px; }
        .tooltip-item:last-child { border-bottom: none; padding-bottom: 0; }
        .tooltip-item .time { font-weight: 800; font-size: 12px; color: var(--accent-main); margin-bottom: 2px; }
        .tooltip-item .title { white-space: pre-wrap; line-height: 1.2; font-weight: 700; }
    </style>
</head>
<body data-theme="transparent" data-color="blueberry">

    <div class="controls-container">
        <div class="picker-group">
            <div class="color-dot" style="background: #E0E0E0;" data-theme-target="transparent"></div>
            <div class="color-dot" style="background: #FFFFFF;" data-theme-target="light"></div>
            <div class="color-dot" style="background: #FFFBE6;" data-theme-target="beige"></div>
            <div class="color-dot" style="background: #191919;" data-theme-target="dark"></div>
        </div>
        <div class="picker-separator"></div>
        <div class="picker-group">
            <div class="color-dot" style="background: linear-gradient(135deg, #C66F80 33%, #4A6644 66%, #FCEBF1 100%);" data-color-target="strawberry"></div>
            <div class="color-dot" style="background: linear-gradient(135deg, #6B705C 33%, #9C6644 66%, #F4F1DE 100%);" data-color-target="matcha"></div>
            <div class="color-dot" style="background: linear-gradient(135deg, #3F3C79 33%, #5A6ACF 66%, #FFF6EC 100%);" data-color-target="blueberry"></div>
            <div class="color-dot" style="background: linear-gradient(135deg, #593C6B 33%, #D4A373 66%, #F8F3FA 100%);" data-color-target="grape"></div>
            <div class="color-dot" style="background: linear-gradient(135deg, #5C4033 33%, #D9A05B 66%, #FCF8F2 100%);" data-color-target="choco"></div>
        </div>
        <div class="picker-separator"></div>
        <div class="picker-group">
            <select class="action-btn outline" id="view-select">
                <option value="year">Vista: Anno</option>
                <option value="month" selected>Vista: Mese</option>
                <option value="week">Vista: Settimana</option>
                <option value="day">Vista: Giorno</option>
            </select>
            <button class="action-btn" id="btn-today">Oggi</button>
        </div>
    </div>

    <div class="calendar-wrapper">
        <div class="month-header" id="dynamic-header">
            <button class="nav-btn" id="btn-prev">◀ Prec</button>
            <h2 id="calendar-title">Mese Anno</h2>
            <button class="nav-btn" id="btn-next">Succ ▶</button>
        </div>
        <div class="calendar-frame">
            <div class="days-row" id="main-days-row">
                <div class="day-name">Lun</div><div class="day-name">Mar</div><div class="day-name">Mer</div><div class="day-name">Gio</div><div class="day-name">Ven</div><div class="day-name">Sab</div><div class="day-name">Dom</div>
            </div>
            <div class="calendar-grid month-view" id="calendar-grid"></div>
        </div>
    </div>

    <div id="event-modal" class="modal-overlay">
        <div class="modal-window" id="modal-window">
            <h3 id="modal-date-title">Data</h3>
            <div id="modal-list-view" style="display: none; flex-direction: column; gap: 5px;">
                <div id="modal-events-list" style="display: flex; flex-direction: column; max-height: 200px; overflow-y: auto;"></div>
                <button class="action-btn outline" onclick="showEventForm(null)">+ Nuovo Evento</button>
                <button class="action-btn outline" onclick="closeModal()">Chiudi</button>
            </div>
            <div id="modal-form-view" style="display: none; flex-direction: column; gap: 12px;">
                <input type="text" id="modal-title" placeholder="Nome dell'Evento...">
                <div class="time-select-container">
                    <div class="time-select-group"><span class="time-select-label">Da:</span><select id="modal-start-hour"><option value="">Ora</option><option value="00">00</option><option value="08">08</option><option value="09">09</option><option value="10">10</option><option value="11">11</option><option value="12">12</option><option value="13">13</option><option value="14">14</option><option value="15">15</option><option value="16">16</option><option value="17">17</option><option value="18">18</option><option value="19">19</option><option value="20">20</option></select>:<select id="modal-start-minute"><option value="">Min</option><option value="00">00</option><option value="15">15</option><option value="30">30</option><option value="45">45</option></select></div>
                    <div class="time-select-group"><span class="time-select-label">A:</span><select id="modal-end-hour"><option value="">Ora</option><option value="00">00</option><option value="09">09</option><option value="10">10</option><option value="11">11</option><option value="12">12</option><option value="13">13</option><option value="14">14</option><option value="15">15</option><option value="16">16</option><option value="17">17</option><option value="18">18</option><option value="19">19</option><option value="20">20</option><option value="21">21</option></select>:<select id="modal-end-minute"><option value="">Min</option><option value="00">00</option><option value="15">15</option><option value="30">30</option><option value="45">45</option></select></div>
                </div>
                <div class="time-select-group"><span class="time-select-label">Fino al:</span><input type="date" id="modal-end-date"></div>
                <textarea id="modal-notes" placeholder="Note..."></textarea>
                <div class="modal-actions"><button class="action-btn btn-delete" onclick="deleteEvent()">Elimina</button><div class="right-btns"><button class="action-btn outline" onclick="backToListOrClose()">Annulla</button><button class="action-btn" onclick="saveEvent()">Salva</button></div></div>
            </div>
        </div>
    </div>
    <div id="site-footer" class="site-footer">Made with ♥ by Il Tuo Nome</div>
    <div id="custom-tooltip"></div>

    <script>
        if (window.self !== window.top) document.getElementById('site-footer').style.display = 'none';
        const safeStorage = { get: (k) => { try { return localStorage.getItem(k); } catch(e) { return null; } }, set: (k, v) => { try { localStorage.setItem(k, v); } catch(e) { } } };
        const grid = document.getElementById('calendar-grid'), title = document.getElementById('calendar-title'), tooltip = document.getElementById('custom-tooltip'), mesi = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];
        let baseDate = new Date(), currentView = safeStorage.get('cal-view') || 'month', currentColor = safeStorage.get('cal-color') || 'blueberry';
        let rawEvents = JSON.parse(safeStorage.get('cal-events-v7') || '{}'), calendarEvents = {};
        for(let k in rawEvents) calendarEvents[k] = Array.isArray(rawEvents[k]) ? rawEvents[k] : [];

        function renderCalendar() {
            try {
                grid.innerHTML = ''; const y = baseDate.getFullYear(), m = baseDate.getMonth(), dHead = document.getElementById('dynamic-header'), mdRow = document.getElementById('main-days-row');
                if (currentView === 'year') { dHead.style.display = 'flex'; mdRow.style.display = 'none'; grid.className = "calendar-grid year-view"; title.innerText = y; for(let i=0; i<12; i++) grid.appendChild(createMiniMonth(y, i)); }
                else if (currentView === 'day') { dHead.style.display = 'none'; mdRow.style.display = 'none'; grid.className = "calendar-grid day-view"; grid.appendChild(createDayTimeline(y, m, baseDate.getDate())); }
                else {
                    dHead.style.display = 'flex'; mdRow.style.display = 'grid'; grid.className = `calendar-grid ${currentView}-view`;
                    if(currentView === 'month') {
                        title.innerText = `${mesi[m]} ${y}`; const pad = new Date(y, m, 1).getDay() === 0 ? 6 : new Date(y, m, 1).getDay() - 1, days = new Date(y, m+1, 0).getDate();
                        for (let i=0; i<pad; i++) grid.appendChild(createCell(y,m,0,true)); for (let d=1; d<=days; d++) grid.appendChild(createCell(y,m,d,false));
                    } else {
                        let mon = getMonday(baseDate); title.innerText = `${mon.getDate()} ${mesi[mon.getMonth()].substring(0,3)} - ${new Date(mon.getTime()+518400000).getDate()} ${mesi[new Date(mon.getTime()+518400000).getMonth()].substring(0,3)} ${y}`;
                        for (let i=0; i<7; i++) { let curr = new Date(mon.getTime() + i*86400000); grid.appendChild(createCell(curr.getFullYear(), curr.getMonth(), curr.getDate(), false)); }
                    }
                }
            } catch(e) { console.error(e); }
        }

        function createCell(y, m, d, empty) {
            const cell = document.createElement('div'); cell.className = `cell ${empty ? 'empty' : ''}`;
            if (!empty) {
                const dk = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                cell.onclick = (e) => { if(e.target === cell || e.target.classList.contains('events-container')) openModal(y,m,d); };
                cell.appendChild(Object.assign(document.createElement('div'), {className: 'date-badge', innerText: d}));
                let evs = calendarEvents[dk] || [];
                evs.forEach(ev => {
                    if (ev.startDate !== ev.endDate) {
                        let bar = document.createElement('div'); bar.className = 'multi-day-bar';
                        if (dk === ev.startDate) bar.classList.add('start'); if (dk === ev.endDate) bar.classList.add('end');
                        cell.appendChild(bar);
                    }
                });
                if(evs.length > 0) {
                    if(currentView === 'month') {
                        cell.appendChild(Object.assign(document.createElement('div'), {className: 'aesthetic-indicator', innerText: '♥'}));
                        cell.onmouseenter = () => showTooltip(cell, evs); cell.onmouseleave = hideTooltip;
                    } else if(currentView === 'week') {
                        const cont = document.createElement('div'); cont.className = 'events-container';
                        evs.forEach(ev => {
                            let b = document.createElement('div'); b.className = 'event-block'; b.innerHTML = `<div class="edit-dots" onclick="event.stopPropagation(); openModal(${y},${m},${d},'${ev.id}')">⋮</div>${ev.timeStart?`<div class="time">${ev.timeStart}</div>`:''}<div class="title">${ev.title||'Evento'}</div>`;
                            cont.appendChild(b);
                        }); cell.appendChild(cont);
                    }
                }
            } return cell;
        }

        function createMiniMonth(y, m) {
            const w = document.createElement('div'); w.className = 'mini-month';
            w.innerHTML = `<div class="mini-month-title">${mesi[m]}</div><div class="mini-days-row"><div>L</div><div>M</div><div>M</div><div>G</div><div>V</div><div>S</div><div>D</div></div>`;
            const mg = document.createElement('div'); mg.className = 'mini-grid';
            const pad = new Date(y, m, 1).getDay() === 0 ? 6 : new Date(y, m, 1).getDay() - 1, days = new Date(y, m+1, 0).getDate();
            for (let i=0; i<pad; i++) mg.appendChild(document.createElement('div'));
            for (let d=1; d<=days; d++) {
                const dk = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`, c = document.createElement('div'); c.className = 'mini-cell'; c.innerText = d;
                let evs = calendarEvents[dk] || []; if (evs.length > 0) c.classList.add('has-event');
                evs.forEach(ev => { if(ev.startDate !== ev.endDate) { let bar = document.createElement('div'); bar.className = 'multi-day-bar'; if(dk===ev.startDate) bar.classList.add('start'); if(dk===ev.endDate) bar.classList.add('end'); c.appendChild(bar); } });
                if(new Date().toDateString() === new Date(y,m,d).toDateString()) c.classList.add('is-today');
                c.onclick = () => { baseDate = new Date(y,m,d); currentView = 'day'; document.getElementById('view-select').value = 'day'; renderCalendar(); };
                mg.appendChild(c);
            } w.appendChild(mg); return w;
        }

        function createDayTimeline(y,m,d) {
            const w = document.createElement('div'); w.className = 'day-timeline-wrapper', dk = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const h = document.createElement('div'); h.className = 'timeline-header';
            h.innerHTML = `<button class="nav-btn" onclick="event.stopPropagation(); navigate(-1)">◀</button><div style="display:flex;flex-direction:column;align-items:center;gap:2px;"><span style="font-size:13px;opacity:0.8;font-weight:700;text-transform:uppercase;">${["Domenica","Lunedì","Martedì","Mercoledì","Giovedì","Venerdì","Sabato"][new Date(y,m,d).getDay()]}</span><span style="font-size:22px;font-weight:800;color:var(--accent-main);">${d} ${mesi[m]} ${y}</span></div><button class="nav-btn" onclick="event.stopPropagation(); navigate(1)">▶</button>`;
            h.onclick = () => openModal(y,m,d); w.appendChild(h);
            const allday = document.createElement('div'); allday.className = 'timeline-allday'; allday.innerHTML = `<div class="allday-label">Eventi</div>`;
            (calendarEvents[dk]||[]).filter(ev => !ev.timeStart).forEach(ev => {
                let b = document.createElement('div'); b.className = 'event-block'; b.style.position = 'relative'; b.innerHTML = `<div class="edit-dots" onclick="event.stopPropagation(); openModal(${y},${m},${d},'${ev.id}')">⋮</div><div class="title">${ev.title||'Senza Titolo'}</div>`; allday.appendChild(b);
            }); w.appendChild(allday);
            const tc = document.createElement('div'); tc.style.position = 'relative';
            for(let i=0; i<24; i++) { let r = document.createElement('div'); r.className = 'timeline-hour-row'; r.onclick = () => openModal(y,m,d,null,`${String(i).padStart(2,'0')}:00`); r.innerHTML = `<div class="timeline-time">${i===0?'12 AM':i<12?i+' AM':i===12?'12 PM':(i-12)+' PM'}</div>`; tc.appendChild(r); }
            (calendarEvents[dk]||[]).filter(ev => ev.timeStart).forEach((ev, idx) => {
                const s = parseTimeStr(ev.timeStart), e = parseTimeStr(ev.timeEnd); let dur = (s && e) ? (e.h*60+e.m) - (s.h*60+s.m) : 60; if(dur<0) dur+=1440;
                let eb = document.createElement('div'); eb.className = 'timeline-event-block'; eb.style.cssText = `top:${s.h*60+s.m}px; height:${Math.max(20,dur)}px; left:${70+(idx%4)*120}px; width:calc(100% - ${90+(idx%4)*120}px); background:${idx%2?'var(--accent-main)':'var(--badge-bg)'}; color:#FFF;`;
                eb.innerHTML = `<div class="edit-dots" onclick="event.stopPropagation(); openModal(${y},${m},${d},'${ev.id}')" style="color:#FFF">⋮</div><div style="font-weight:800;font-size:11px;opacity:0.9;">${formatTimeRange(ev.timeStart, ev.timeEnd)}</div><div style="font-weight:700;font-size:13px;">${ev.title||'Evento'}</div>`; tc.appendChild(eb);
            }); w.appendChild(tc); return w;
        }

        function showTooltip(cell, evs) {
            let html = ''; evs.forEach(ev => html += `<div class="tooltip-item">${ev.timeStart?`<div class="time">${formatTimeRange(ev.timeStart, ev.timeEnd)}</div>`:''}<div class="title">${ev.title||'Evento'}</div></div>`);
            tooltip.innerHTML = html; tooltip.style.display = 'flex'; const r = cell.getBoundingClientRect(); tooltip.style.left = `${r.left + r.width/2}px`; tooltip.style.top = `${r.top - 5}px`;
            setTimeout(() => { tooltip.style.opacity = '1'; tooltip.style.transform = 'translate(-50%, -100%) scale(1)'; }, 10);
        }
        function hideTooltip() { tooltip.style.opacity = '0'; setTimeout(() => { if(tooltip.style.opacity === '0') tooltip.style.display = 'none'; }, 200); }
        function getMonday(d) { let dt = new Date(d); let day = dt.getDay(), diff = dt.getDate() - day + (day === 0 ? -6 : 1); return new Date(dt.setDate(diff)); }
        function navigate(dir) { if(currentView==='month') baseDate.setMonth(baseDate.getMonth()+dir); else if(currentView==='week') baseDate.setDate(baseDate.getDate()+dir*7); else if(currentView==='day') baseDate.setDate(baseDate.getDate()+dir); renderCalendar(); }
        function goToToday() { baseDate = new Date(); renderCalendar(); }
        function changeView(v) { currentView = v; safeStorage.set('cal-view', v); renderCalendar(); }
        function openModalFromParams(y,m,d,id) { openModal(y,m,d,id); }
        function closeModal() { document.getElementById('event-modal').style.display = 'none'; }
        function backToListOrClose() { let evs = calendarEvents[currentEditingDateKey] || []; if(evs.length > 0) showEventList(); else closeModal(); }
        
        function saveEvent() {
            const t = document.getElementById('modal-title').value.trim(), hs = document.getElementById('modal-start-hour').value, ms = document.getElementById('modal-start-minute').value, he = document.getElementById('modal-end-hour').value, me = document.getElementById('modal-end-minute').value, n = document.getElementById('modal-notes').value.trim(), edVal = document.getElementById('modal-end-date').value;
            const start = currentEditingDateKey, end = edVal || start, id = currentEditingId || Date.now().toString(36);
            for(let k in calendarEvents) calendarEvents[k] = (calendarEvents[k]||[]).filter(e => e.id !== id);
            let curr = new Date(start), endD = new Date(end);
            while(curr <= endD) {
                let dk = `${curr.getFullYear()}-${String(curr.getMonth()+1).padStart(2,'0')}-${String(curr.getDate()).padStart(2,'0')}`;
                if(!calendarEvents[dk]) calendarEvents[dk] = []; calendarEvents[dk].push({id, title:t, timeStart:hs?`${hs}:${ms}`:'', timeEnd:he?`${he}:${me}`:'', notes:n, startDate:start, endDate:end});
                curr.setDate(curr.getDate()+1);
            }
            safeStorage.set('cal-events-v7', JSON.stringify(calendarEvents)); closeModal(); renderCalendar();
        }
        function deleteEvent() { if(currentEditingId && confirm("Eliminare?")) { for(let k in calendarEvents) calendarEvents[k] = (calendarEvents[k]||[]).filter(e => e.id !== currentEditingId); safeStorage.set('cal-events-v7', JSON.stringify(calendarEvents)); closeModal(); renderCalendar(); } }

        document.getElementById('event-modal').onclick = function(e) { if(e.target===this) closeModal(); };
        setTheme(currentTheme); setColor(currentColor, true); renderCalendar();
    </script>
</body>
</html>
