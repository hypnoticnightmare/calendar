<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="darkreader-lock">
    <meta name="color-scheme" content="light">
    <title>Aesthetic Calendar - Multi-Color Fruit Palettes</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&family=Mali:wght@500;600&display=swap" rel="stylesheet">
    <style>
        :root, html, body {
            forced-color-adjust: none !important;
            color-adjust: exact !important;
        }

        :root {
            --page-bg: transparent; 
            --text-color: #4A3A35;
            --badge-text: #FFFFFF;       
            --btn-bg: #FFF;
        }

        /* --- SFONDI NOTION --- */
        [data-theme="light"] { --page-bg: #FFFFFF; --text-color: #4A3A35; --btn-bg: #FFFFFF; }
        [data-theme="beige"] { --page-bg: #FFFBE6; --text-color: #5A504B; --btn-bg: #FFFBE6; }
        [data-theme="dark"] { --page-bg: #191919; --text-color: #F0F0F0; --btn-bg: #2C2C2C; }
        [data-theme="transparent"] { --page-bg: transparent; }

        /* --- PALETTE COLORI (3 Colori Frutta/Cibo) --- */
        [data-color="strawberry"] { 
            --accent-main: #C66F80; /* Rosa Scuro */
            --badge-bg: #4A6644;    /* Verde Foglia */
            --cell-bg: #FCEBF1;     /* Rosa Panna */
            --header-bg: #FADCE5;   /* Rosa per intestazioni */
        }
        [data-color="matcha"] { 
            --accent-main: #6B705C; /* Verde Matcha */
            --badge-bg: #9C6644;    /* Marrone Legno/Azuki */
            --cell-bg: #F4F1DE;     /* Crema/Latte */
            --header-bg: #EAE2B7;   /* Beige Caldo */
        }
        [data-color="blueberry"] { 
            --accent-main: #3D405B; /* Blu Scuro */
            --badge-bg: #815ACB;    /* Viola Acceso */
            --cell-bg: #F0F3FA;     /* Azzurro Ghiaccio */
            --header-bg: #E2E6F0;   /* Grigio Azzurro */
        }
        [data-color="grape"] { 
            --accent-main: #593C6B; /* Viola Uva */
            --badge-bg: #D4A373;    /* Oro/Senape per tralci */
            --cell-bg: #F8F3FA;     /* Lilla Chiarissimo */
            --header-bg: #EBE0F0;   /* Lilla Pastello */
        }
        [data-color="choco"] { 
            --accent-main: #5C4033; /* Cioccolato Fondente */
            --badge-bg: #D9A05B;    /* Caramello */
            --cell-bg: #FCF8F2;     /* Vaniglia */
            --header-bg: #F2E3D5;   /* Biscotto */
        }

        /* --- Adattamento Modalità Scura (Colori in armonia) --- */
        [data-theme="dark"][data-color="strawberry"] { --accent-main: #D68594; --badge-bg: #6A8A63; --cell-bg: #2B1C20; --header-bg: #3D282D; }
        [data-theme="dark"][data-color="matcha"] { --accent-main: #8A9276; --badge-bg: #B88565; --cell-bg: #1E2219; --header-bg: #2B3024; }
        [data-theme="dark"][data-color="blueberry"] { --accent-main: #5A5E85; --badge-bg: #9E7CE6; --cell-bg: #1A1C23; --header-bg: #252833; }
        [data-theme="dark"][data-color="grape"] { --accent-main: #805B96; --badge-bg: #E3BB91; --cell-bg: #221B26; --header-bg: #302636; }
        [data-theme="dark"][data-color="choco"] { --accent-main: #7A5849; --badge-bg: #E6B57A; --cell-bg: #241D1A; --header-bg: #332A26; }

        body, html {
            margin: 0; padding: clamp(5px, 2vw, 15px); 
            background-color: var(--page-bg);
            font-family: 'Nunito', sans-serif; 
            color: var(--text-color);
            display: flex; flex-direction: column; align-items: center; 
            transition: background-color 0.3s ease;
        }

        /* --- CONTROLLI --- */
        .controls-container {
            display: flex; gap: 15px; margin-bottom: 20px;
            padding: 8px 20px; background-color: var(--btn-bg); 
            border-radius: 20px; align-items: center; flex-wrap: wrap; 
            justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 2px solid var(--accent-main);
        }
        .picker-group { display: flex; gap: 8px; align-items: center; }
        .picker-separator { width: 2px; height: 20px; background-color: var(--accent-main); opacity: 0.3; }
        
        .color-dot {
            width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
            border: 2px solid var(--accent-main); transition: transform 0.2s;
        }
        .color-dot:hover { transform: scale(1.2); }
        
        .action-btn {
            background-color: var(--badge-bg); color: var(--badge-text); 
            border: 2px solid var(--accent-main); border-radius: 12px; 
            padding: 4px 12px; font-family: 'Nunito', sans-serif; font-weight: 700; 
            cursor: pointer; transition: all 0.2s ease;
        }
        .action-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .action-btn.outline { background-color: var(--btn-bg); color: var(--text-color); }

        /* --- CALENDARIO --- */
        .calendar-wrapper { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 10px; }
        .month-header {
            display: flex; justify-content: space-between; align-items: center;
            background-color: var(--header-bg); padding: 10px 20px;
            border-radius: 16px; border: 3px solid var(--accent-main);
        }
        .month-header h2 { margin: 0; font-size: 24px; color: var(--accent-main); text-transform: uppercase; font-weight: 800; }
        .nav-btn {
            background: var(--btn-bg); border: 2px solid var(--accent-main);
            color: var(--accent-main); border-radius: 8px; cursor: pointer;
            padding: 4px 12px; font-weight: bold; font-family: 'Nunito';
        }

        .calendar-frame {
            background-color: var(--accent-main); 
            padding: 6px; border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .days-row {
            display: grid; grid-template-columns: repeat(7, 1fr);
            gap: 4px; margin-bottom: 4px;
        }
        .day-name {
            background-color: var(--header-bg); color: var(--accent-main);
            text-align: center; font-weight: 800; font-size: 14px;
            padding: 8px 0; border-radius: 8px; text-transform: uppercase;
        }
        .calendar-grid {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; 
        }

        /* --- CELLE E BLOCCO DIMENSIONI --- */
        .cell {
            background-color: var(--cell-bg);
            border-radius: 8px;
            display: flex; flex-direction: column;
            transition: all 0.2s ease;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            
            /* GABBIA D'ACCIAIO: Dimensioni bloccate */
            min-width: 0;
            min-height: 0;
        }

        /* VISTA MESE: Quadrati perfetti */
        .month-view .cell { aspect-ratio: 1 / 1; }

        /* VISTA SETTIMANA: Rettangoli alti */
        .week-view .cell { aspect-ratio: auto; min-height: 400px; }

        /* Modifiche visive se c'è un evento */
        .cell.has-event {
            background-color: var(--header-bg); 
        }
        .cell:hover:not(.empty) { filter: brightness(0.92); }
        .cell.empty { background-color: rgba(255,255,255,0.4); border-color: transparent; cursor: default; }
        [data-theme="dark"] .cell.empty { background-color: rgba(0,0,0,0.2); }

        .date-badge {
            background-color: var(--badge-bg); color: var(--badge-text);
            border-radius: 6px; padding: 2px 8px; margin: 6px;
            align-self: flex-start; font-weight: 800; font-size: 14px;
            border: 2px solid var(--accent-main);
            flex-shrink: 0; 
            position: relative;
            z-index: 15;
        }

        /* --- INDICATORE AESTHETIC (Scintilla) --- */
        .aesthetic-indicator {
            position: absolute;
            bottom: 6px; right: 8px;
            color: var(--badge-bg); /* Usa il colore secondario per contrasto massimo */
            font-size: 20px;
            text-shadow: 0 0 8px var(--badge-bg);
            animation: floatSparkle 2.5s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes floatSparkle {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.8; }
            50% { transform: translateY(-4px) scale(1.15); opacity: 1; }
        }

        /* --- NUVOLETTA TOOLTIP ESTERNA --- */
        #custom-tooltip {
            position: fixed;
            display: none;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.96);
            border: 3px solid var(--accent-main);
            color: var(--text-color);
            padding: 12px 16px;
            border-radius: 14px;
            font-family: 'Mali', cursive;
            font-size: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            pointer-events: none;
            z-index: 10000;
            width: max-content;
            max-width: 250px;
            word-wrap: break-word;
            
            opacity: 0;
            transform: translate(-50%, -90%) scale(0.95);
            transition: opacity 0.2s ease, transform 0.2s ease;
            backdrop-filter: blur(4px);
        }

        [data-theme="dark"] #custom-tooltip { background: rgba(40, 40, 40, 0.96); }

        #custom-tooltip .time { font-weight: 800; font-size: 12px; color: var(--accent-main); margin-bottom: 4px; }
        #custom-tooltip .title { white-space: pre-wrap; line-height: 1.3; font-weight: 700; }
        #custom-tooltip .notes-preview { font-size: 12px; opacity: 0.8; margin-top: 6px; white-space: pre-wrap; border-top: 1px dashed var(--accent-main); padding-top: 6px; }

        /* --- FINESTRA MODAL (POP-UP EVENTO) --- */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5); z-index: 9999;
            justify-content: center; align-items: center;
            backdrop-filter: blur(2px);
        }
        .modal-window {
            background: var(--cell-bg);
            border: 4px solid var(--accent-main);
            border-radius: 16px; padding: 20px;
            width: 90%; max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; gap: 12px;
        }
        .modal-window h3 {
            margin: 0; color: var(--accent-main); font-size: 22px; 
            text-transform: uppercase; font-weight: 800; text-align: center;
        }
        .modal-window input, .modal-window textarea {
            width: 100%; box-sizing: border-box;
            background: var(--btn-bg); border: 2px solid var(--accent-main);
            color: var(--text-color); border-radius: 8px;
            padding: 10px; font-family: 'Mali', cursive; font-size: 16px;
            outline: none;
        }
        .modal-window input:focus, .modal-window textarea:focus { filter: brightness(0.95); }
        .modal-window textarea { resize: vertical; min-height: 80px; }
        
        .modal-actions { display: flex; justify-content: space-between; margin-top: 10px; gap: 8px; }
        .modal-actions .right-btns { display: flex; gap: 8px; }
        
        .btn-delete { background-color: #E53935; color: white; border-color: #B71C1C; }
        .btn-delete:hover { background-color: #D32F2F; }

    </style>
</head>
<body data-theme="transparent" data-color="strawberry">

    <div class="controls-container">
        <div class="picker-group">
            <div class="color-dot" style="background: #E0E0E0; border-color: #999;" data-theme-target="transparent" title="Sfondo Notion (Trasparente)"></div>
            <div class="color-dot" style="background: #FFFFFF; border-color: #CCC;" data-theme-target="light" title="Chiaro"></div>
            <div class="color-dot" style="background: #FFFBE6; border-color: #D4CDA3;" data-theme-target="beige" title="Beige Notion"></div>
            <div class="color-dot" style="background: #191919; border-color: #555;" data-theme-target="dark" title="Scuro"></div>
        </div>
        <div class="picker-separator"></div>
        
        <div class="picker-group">
            <div class="color-dot" style="background: linear-gradient(135deg, #C66F80 0% 33%, #4A6644 33% 66%, #FCEBF1 66% 100%);" data-color-target="strawberry" title="Fragola"></div>
            <div class="color-dot" style="background: linear-gradient(135deg, #6B705C 0% 33%, #9C6644 33% 66%, #F4F1DE 66% 100%);" data-color-target="matcha" title="Matcha"></div>
            <div class="color-dot" style="background: linear-gradient(135deg, #3D405B 0% 33%, #815ACB 33% 66%, #F0F3FA 66% 100%);" data-color-target="blueberry" title="Mirtillo"></div>
            <div class="color-dot" style="background: linear-gradient(135deg, #593C6B 0% 33%, #D4A373 33% 66%, #F8F3FA 66% 100%);" data-color-target="grape" title="Uva"></div>
            <div class="color-dot" style="background: linear-gradient(135deg, #5C4033 0% 33%, #D9A05B 33% 66%, #FCF8F2 66% 100%);" data-color-target="choco" title="Cioccolato"></div>
        </div>
        
        <div class="picker-separator"></div>
        <div class="picker-group">
            <button class="action-btn outline" id="view-toggle-btn" onclick="toggleView()">Vista: Mese</button>
            <button class="action-btn" onclick="goToToday()">Oggi</button>
        </div>
    </div>

    <div class="calendar-wrapper">
        <div class="month-header">
            <button class="nav-btn" onclick="navigate(-1)">◀ Prec</button>
            <h2 id="calendar-title">Mese Anno</h2>
            <button class="nav-btn" onclick="navigate(1)">Succ ▶</button>
        </div>

        <div class="calendar-frame">
            <div class="days-row">
                <div class="day-name">Lun</div><div class="day-name">Mar</div>
                <div class="day-name">Mer</div><div class="day-name">Gio</div>
                <div class="day-name">Ven</div><div class="day-name">Sab</div>
                <div class="day-name">Dom</div>
            </div>
            <div class="calendar-grid month-view" id="calendar-grid">
                </div>
        </div>
    </div>

    <div id="custom-tooltip"></div>

    <div id="event-modal" class="modal-overlay">
        <div class="modal-window">
            <h3 id="modal-date-title">Data</h3>
            
            <input type="text" id="modal-title" placeholder="Nome dell'Evento (es. Appuntamento)..." autocomplete="off">
            <input type="text" id="modal-time" placeholder="Ora o Durata (es. 15:00 - 16:30)..." autocomplete="off">
            <textarea id="modal-notes" placeholder="Note aggiuntive o dettagli..."></textarea>
            
            <div class="modal-actions">
                <button class="action-btn btn-delete" onclick="deleteEvent()">Elimina</button>
                <div class="right-btns">
                    <button class="action-btn outline" onclick="closeModal()">Annulla</button>
                    <button class="action-btn" onclick="saveEvent()">Salva</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const safeStorage = {
            get: function(key) { try { return localStorage.getItem(key); } catch(e) { return null; } },
            set: function(key, val) { try { localStorage.setItem(key, val); } catch(e) { console.warn("Memoria bloccata."); } }
        };

        function setTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            safeStorage.set('cal-square-theme', theme);
        }
        function setColor(color) {
            document.body.setAttribute('data-color', color);
            safeStorage.set('cal-square-color', color);
        }
        setTheme(safeStorage.get('cal-square-theme') || 'transparent');
        setColor(safeStorage.get('cal-square-color') || 'strawberry');

        document.querySelectorAll('[data-theme-target]').forEach(dot => {
            dot.addEventListener('click', () => setTheme(dot.getAttribute('data-theme-target')));
        });
        document.querySelectorAll('[data-color-target]').forEach(dot => {
            dot.addEventListener('click', () => setColor(dot.getAttribute('data-color-target')));
        });

        let calendarEvents = JSON.parse(safeStorage.get('cal-square-events')) || {};
        let currentEditingDate = null;
        let baseDate = new Date();
        let currentView = safeStorage.get('cal-square-view') || 'month';

        const grid = document.getElementById('calendar-grid');
        const title = document.getElementById('calendar-title');
        const viewToggleBtn = document.getElementById('view-toggle-btn');
        const tooltip = document.getElementById('custom-tooltip');
        const mesi = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];

        function openModal(year, month, day) {
            currentEditingDate = `${year}-${String(month+1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            document.getElementById('modal-date-title').innerText = `${day} ${mesi[month]} ${year}`;
            
            const ev = calendarEvents[currentEditingDate] || { title: '', time: '', notes: '' };
            document.getElementById('modal-title').value = ev.title;
            document.getElementById('modal-time').value = ev.time;
            document.getElementById('modal-notes').value = ev.notes;
            
            document.getElementById('event-modal').style.display = 'flex';
            
            tooltip.style.opacity = '0';
            setTimeout(() => tooltip.style.display = 'none', 200);
        }

        function closeModal() {
            document.getElementById('event-modal').style.display = 'none';
        }

        function saveEvent() {
            const title = document.getElementById('modal-title').value.trim();
            const time = document.getElementById('modal-time').value.trim();
            const notes = document.getElementById('modal-notes').value.trim();
            
            if(title || time || notes) {
                calendarEvents[currentEditingDate] = { title, time, notes };
            } else {
                delete calendarEvents[currentEditingDate];
            }
            
            safeStorage.set('cal-square-events', JSON.stringify(calendarEvents));
            closeModal();
            renderCalendar();
        }

        function deleteEvent() {
            if(confirm("Sei sicuro di voler eliminare questo evento?")) {
                delete calendarEvents[currentEditingDate];
                safeStorage.set('cal-square-events', JSON.stringify(calendarEvents));
                closeModal();
                renderCalendar();
            }
        }

        document.getElementById('event-modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        function toggleView() {
            currentView = currentView === 'month' ? 'week' : 'month';
            safeStorage.set('cal-square-view', currentView);
            renderCalendar();
        }

        function goToToday() {
            baseDate = new Date();
            renderCalendar();
        }

        function navigate(direction) {
            if (currentView === 'month') { baseDate.setMonth(baseDate.getMonth() + direction); } 
            else { baseDate.setDate(baseDate.getDate() + (direction * 7)); }
            renderCalendar();
        }

        function getMonday(d) {
            let date = new Date(d);
            let day = date.getDay();
            let diff = date.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(date.setDate(diff));
        }

        function createCell(year, month, day, isEmpty) {
            const cell = document.createElement('div');
            cell.className = `cell ${isEmpty ? 'empty' : ''}`;
            
            if (!isEmpty) {
                cell.onclick = () => openModal(year, month, day);
                
                const badge = document.createElement('div');
                badge.className = 'date-badge';
                badge.innerText = day;
                cell.appendChild(badge);

                const dateKey = `${year}-${String(month+1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const ev = calendarEvents[dateKey];
                
                if(ev && (ev.title || ev.time || ev.notes)) {
                    cell.classList.add('has-event');
                    
                    const indicator = document.createElement('div');
                    indicator.className = 'aesthetic-indicator';
                    indicator.innerText = '✦';
                    cell.appendChild(indicator);

                    cell.addEventListener('mouseenter', () => {
                        let html = '';
                        if(ev.time) html += `<div class="time">${ev.time}</div>`;
                        if(ev.title) html += `<div class="title">${ev.title}</div>`;
                        if(ev.notes) html += `<div class="notes-preview">📝 ${ev.notes}</div>`;
                        else if(!ev.title && !ev.notes) html += `<div class="title">Evento Programmato</div>`;
                        
                        tooltip.innerHTML = html;
                        tooltip.style.display = 'flex';
                        
                        const rect = cell.getBoundingClientRect();
                        tooltip.style.left = `${rect.left + (rect.width / 2)}px`;
                        tooltip.style.top = `${rect.top - 5}px`;
                        
                        requestAnimationFrame(() => {
                            tooltip.style.opacity = '1';
                            tooltip.style.transform = 'translate(-50%, -100%) scale(1)';
                        });
                    });

                    cell.addEventListener('mouseleave', () => {
                        tooltip.style.opacity = '0';
                        tooltip.style.transform = 'translate(-50%, -90%) scale(0.95)';
                        setTimeout(() => {
                            if(tooltip.style.opacity === '0') tooltip.style.display = 'none';
                        }, 200);
                    });
                }
            }
            return cell;
        }

        function renderCalendar() {
            grid.innerHTML = '';
            const year = baseDate.getFullYear();
            const month = baseDate.getMonth();

            if (currentView === 'month') {
                viewToggleBtn.innerText = "Vista: Mese";
                grid.className = "calendar-grid month-view";
                title.innerText = `${mesi[month]} ${year}`;

                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const startPad = firstDay === 0 ? 6 : firstDay - 1; 

                for (let i = 0; i < startPad; i++) grid.appendChild(createCell(year, month, 0, true));
                for (let day = 1; day <= daysInMonth; day++) grid.appendChild(createCell(year, month, day, false));
                
                const totalCells = startPad + daysInMonth;
                const endPad = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
                for (let i = 0; i < endPad; i++) grid.appendChild(createCell(year, month, 0, true));

            } else {
                viewToggleBtn.innerText = "Vista: Settimana";
                grid.className = "calendar-grid week-view";
                
                const monday = getMonday(baseDate);
                const sunday = new Date(monday);
                sunday.setDate(sunday.getDate() + 6);
                
                if(monday.getMonth() === sunday.getMonth()) {
                    title.innerText = `${monday.getDate()} - ${sunday.getDate()} ${mesi[monday.getMonth()]} ${monday.getFullYear()}`;
                } else {
                    title.innerText = `${monday.getDate()} ${mesi[monday.getMonth()].substring(0,3)} - ${sunday.getDate()} ${mesi[sunday.getMonth()].substring(0,3)} ${sunday.getFullYear()}`;
                }

                for (let i = 0; i < 7; i++) {
                    let currentDay = new Date(monday);
                    currentDay.setDate(currentDay.getDate() + i);
                    grid.appendChild(createCell(currentDay.getFullYear(), currentDay.getMonth(), currentDay.getDate(), false));
                }
            }
        }

        renderCalendar();
    </script>
</body>
</html>
